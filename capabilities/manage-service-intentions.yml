aid: consul-connect:capability:manage-service-intentions
name: Manage Service-to-Service Intentions
description: >-
  Workflow for managing Consul Connect intentions that control which services
  in the mesh may communicate. Lists existing intentions, creates or
  replaces an intention by source and destination, reads it back, evaluates
  whether a connection would be authorized via the check endpoint, and
  cleans up by deleting the intention. Useful for platform teams using
  Consul Connect for mTLS-enforced authorization between services.
api: consul-connect:consul-connect-api
openapi: openapi/consul-connect-openapi.yml
tags:
  - Authorization
  - Intentions
  - Service Mesh
  - mTLS
operations:
  - operationId: listIntentions
    method: GET
    path: /connect/intentions
    purpose: Inventory all intentions in the cluster
  - operationId: upsertIntentionByExact
    method: PUT
    path: /connect/intentions/exact
    purpose: Create or replace an intention by source and destination services
  - operationId: readIntentionByExact
    method: GET
    path: /connect/intentions/exact
    purpose: Read the intention back to confirm action and metadata
  - operationId: checkIntention
    method: GET
    path: /connect/intentions/check
    purpose: Evaluate whether the resulting source/destination pair is authorized
  - operationId: deleteIntentionByExact
    method: DELETE
    path: /connect/intentions/exact
    purpose: Remove the intention to revert to default deny or allow
useCases:
  - Roll out default-deny across the mesh and explicitly allow critical paths
  - Provide self-service authorization between teams using GitOps
  - Audit which services can talk to each other in production
  - Validate proposed changes against the check endpoint before applying
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
