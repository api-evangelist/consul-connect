aid: consul-connect:capability:rotate-mesh-ca
name: Rotate the Connect Mesh Certificate Authority
description: >-
  Workflow for inspecting and rotating the Consul Connect mesh CA. Lists the
  current root certificates, reads the active CA configuration, and updates
  the CA configuration to switch providers, extend TTLs, or rotate roots.
  This capability is used by platform engineers operating Consul Connect at
  scale and integrating with HashiCorp Vault, AWS Private CA, or external
  PKI.
api: consul-connect:consul-connect-api
openapi: openapi/consul-connect-openapi.yml
tags:
  - Certificate Authority
  - PKI
  - Rotation
  - Service Mesh
operations:
  - operationId: listCaRoots
    method: GET
    path: /connect/ca/roots
    purpose: Inspect the active root and all known root certificates in the cluster
  - operationId: getCaConfiguration
    method: GET
    path: /connect/ca/configuration
    purpose: Read the current CA provider and configuration
  - operationId: updateCaConfiguration
    method: PUT
    path: /connect/ca/configuration
    purpose: Update the CA provider or rotate roots, optionally with cross-signing
useCases:
  - Migrate the mesh CA from the built-in Consul provider to Vault PKI
  - Rotate the mesh root certificate as part of compliance requirements
  - Extend leaf TTLs to reduce CA load in large deployments
  - Validate root certificate chains in disaster recovery exercises
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
